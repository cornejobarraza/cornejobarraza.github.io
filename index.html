<!DOCTYPE html><html lang="en"><head>
    <base href="/">
    <meta charset="utf-8">
    <link rel="icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Home page for David's website that acts as his portfolio">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://kit.fontawesome.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" media="print" onload="this.media='all'; this.onload=null;">
    <style type="text/css">
      ::-webkit-scrollbar {
        width: 16px;
      }
      ::-webkit-scrollbar-track {
        background: #0000;
      }
      ::-webkit-scrollbar-thumb {
        background: #aaa;
        background-clip: content-box;
        border: 4px solid #0000;
        border-radius: 100px;
      }
      :root {
        --light-bg-primary: #e8e8e8;
        --dark-bg-primary: #212529;
        --light-bg-secondary: #d5d8dd;
        --dark-bg-secondary: #42454d;
        --dark-bg-tertiary: #171717;
        --light-txt-primary: #2e3338;
        --dark-txt-primary: #dcddde;
        --light-txt-secondary: #060607;
        --dark-txt-secondary: #fff;
        --text: var(--light-txt-primary);
        --active: var(--dark-txt-secondary);
        --headers: var(--light-txt-secondary);
        --primary: var(--light-bg-primary);
        --secondary: var(--light-bg-secondary);
        --tertiary: var(--dark-bg-tertiary);
      }
      .dark {
        --text: var(--dark-txt-primary);
        --active: var(--light-txt-secondary);
        --headers: var(--dark-txt-secondary);
        --primary: var(--dark-bg-primary);
        --secondary: var(--dark-bg-secondary);
      }
      body,
      html {
        margin: 0;
        padding: 0;
      }
      body {
        -ms-interpolation-mode: nearest-neighbor;
        background: var(--primary);
        color: var(--text);
        height: calc(var(--vh, 1vh) * 100);
        image-rendering: -moz-crisp-edges;
        image-rendering: -o-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }
      .btn {
        background: var(--headers);
        border: 0;
        border-radius: 0.75rem;
        color: var(--active);
        transition: 0.1s;
      }
      .btn:hover {
        color: var(--active);
        font-weight: bold;
      }
      .btn:focus {
        box-shadow: none;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      i {
        color: var(--headers);
      }
      #lightToggle > i {
        color: var(--active);
        font-size: 1.1rem !important;
      }
      .text-light h6,
      .text-light i {
        color: #fff;
      }
      .text-muted i {
        color: #6c757d;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #717171;
        background-clip: content-box;
        border: 4px solid #0000;
        border-radius: 100px;
      }
      .toggledDark body,
      .toggledLight body {
        transition: background 0.5s;
      }
      .fs-7 {
        font-size: 0.9rem;
      }
      .active-link {
        background: var(--headers) !important;
        color: var(--active) !important;
        font-weight: 700;
      }
      #description {
        background: #000;
        border-radius: 0.5rem;
        color: #fff;
        font-size: 0.9rem;
        left: 50%;
        opacity: 0;
        padding: 0.75rem 1rem;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -130%);
        transition: 0.25s ease;
        width: 18rem;
        z-index: -1;
      }
      #description a {
        color: var(--headers);
        font-weight: 700;
        text-decoration: none;
      }
      .arrow,
      .arrow:after {
        position: absolute;
      }
      .arrow:after {
        content: "";
        bottom: -18%;
        border: 7px solid #0000;
        border-top-color: #000;
      }

      #description2 {
        background: #000;
        border-radius: 0.5rem;
        color: #fff;
        font-size: 0.9rem;
        left: 50%;
        margin-top: 1.5rem;
        padding: 0.75rem 1rem;
        width: 17rem;
      }
      .arrow2,
      .arrow2:after {
        position: absolute;
      }
      .arrow2:after {
        border: 7px solid #0000;
        border-top-color: #000;
        bottom: 2rem;
        content: "";
        left: -0.2rem;
        transform: rotate(180deg);
      }
    </style>
    <link rel="preload" href="styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="styles.css" /></noscript>
    <script>
      let prefersLight = localStorage.getItem("keepLightMode");

      if (prefersLight === null || prefersLight === "no") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script defer src="https://kit.fontawesome.com/9179da1dfb.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    <title>Portfolio | Home</title>
  </head>

</body></html>
