<!DOCTYPE html>
<html lang="en">
  <head>
    <base href="/" />
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Home page for David's website that acts as his portfolio" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
      media="print"
      onload="this.media='all'; this.onload=null;"
    />
    <style type="text/css">
      ::-webkit-scrollbar {
        width: 16px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #aaaaaa;
        border: 4px solid transparent;
        border-radius: 100px;
        background-clip: content-box;
      }
      :root {
        --light-bg-primary: #ffffff;
        --dark-bg-primary: #212529;
        --light-bg-secondary: #d5d8dd;
        --dark-bg-secondary: #42454d;
        --dark-bg-tertiary: #171717;
        --light-txt-primary: #2e3338;
        --dark-txt-primary: #dcddde;
        --light-txt-secondary: #060607;
        --dark-txt-secondary: #ffffff;
        --text: var(--light-txt-primary);
        --active: var(--dark-txt-secondary);
        --headers: var(--light-txt-secondary);
        --primary: var(--light-bg-primary);
        --secondary: var(--light-bg-secondary);
        --tertiary: var(--dark-bg-tertiary);
      }
      .dark {
        --text: var(--dark-txt-primary);
        --active: var(--light-txt-secondary);
        --headers: var(--dark-txt-secondary);
        --primary: var(--dark-bg-primary);
        --secondary: var(--dark-bg-secondary);
      }
      body,
      html {
        margin: 0;
        padding: 0;
      }
      body {
        color: var(--text);
        background: var(--primary);
        height: calc(var(--vh, 1vh) * 100);
        image-rendering: -moz-crisp-edges;
        image-rendering: -o-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        -ms-interpolation-mode: nearest-neighbor;
      }
      #log {
        z-index: 1;
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #fff;
        font-weight: 700;
      }
      app-root {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      header,
      footer {
        background: var(--dark-bg-tertiary);
      }
      header {
        border-bottom: 1px solid black;
      }
      nav .container {
        padding-left: var(--bs-gutter-x, 1.25rem);
        padding-right: var(--bs-gutter-x, 1.25rem);
      }
      main {
        margin-top: 3rem;
        margin-bottom: 3rem;
      }
      main .btn {
        color: var(--active);
        background: var(--headers);
        border: 1px solid var(--tertiary);
        border-radius: 0.75rem;
        transition: 0.15s;
      }
      footer {
        font-size: 0.95rem;
        border-top: 1px solid black;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--headers);
      }
      i {
        color: var(--headers);
        background: transparent;
      }
      .text-light i,
      .text-light h6 {
        color: #fff;
      }
      .text-muted i {
        color: #6c757d;
      }
      #description {
        color: #fff;
        z-index: -1;
        position: absolute;
        top: 50%;
        font-size: 0.9rem;
        left: 50%;
        width: 19rem;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        background: black;
        transform: translate(-50%, -140%);
        opacity: 0;
        transition: all 0.25s ease;
      }
      #lightToggle {
        position: fixed;
        z-index: 1000;
        right: 1rem;
        bottom: 1rem;
        display: flex;
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        background-color: #2959ee;
        box-shadow: 0 0 0.25em #202225;
        transition: all 0.15s ease;
      }
      #lightToggle i {
        color: #fff;
        font-size: 1.1rem !important;
      }
    </style>
    <link rel="preload" href="styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="styles.css" /></noscript>
    <script>
      let prefersLight = localStorage.getItem("keepLightMode");

      if (prefersLight === null || prefersLight === "no") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script defer src="https://kit.fontawesome.com/9179da1dfb.js" crossorigin="anonymous"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
      integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
      crossorigin="anonymous"
    ></script>
    <title>Portfolio | Home</title>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
