<div class="col-md-7 col-lg-8 mx-auto">
  <span id="date" class="badge rounded-pill fw-bold mb-4">{{ this.date }}</span>
  <div id="toDoCard" class="card text-dark mx-auto">
    <div class="card-header text-center px-4">
      <h6 class="fw-bold text-dark m-0">What's pending for today?</h6>
    </div>
    <div class="card-body px-4">
      <div @fade *ngFor="let task of tasks; let i = index">
        <ul id="list" class="list-unstyled mx-2 mb-2">
          <li class="d-flex">
            <div>
              <input
                id="{{ task.id }}"
                class="form-check-input me-2"
                type="checkbox"
                [(ngModel)]="task.completed"
                (change)="[!(task.completed = tasks[i].completed), saveTasks()]"
              />
            </div>
            <label class="form-check-label" for="{{ task.id }}">{{ task.title }}</label>
          </li>
        </ul>
      </div>
      <form class="mt-3" [formGroup]="toDoForm" (ngSubmit)="onSubmit()">
        <div class="input-group mx-auto">
          <input id="taskInput" class="form-control" type="text" formControlName="taskTitle" placeholder="New task" />
          <button type="submit" class="btn btn-sm btn-dark">
            <i class="fa-solid fa-thumbtack text-light px-1"></i>
          </button>
          <button type="button" class="btn btn-sm btn-dark" (click)="clearTasks()">
            <i class="fa-solid fa-trash text-light px-1"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
