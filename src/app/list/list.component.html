<div class="col mx-auto" style="position: relative">
  <span id="date" class="badge rounded-pill fw-bold mb-4">{{ this.date }}</span>
  <div id="toDoCard" class="card mx-auto">
    <div class="card-header text-start px-4">
      <h6 class="fw-bold m-0 text-center">Tasks for today</h6>
      <a id="aboutList" href="javascript:;" target="_blank" aria-label="About To-Do list"
        ><i class="fa-solid fa-circle-question fs-6"></i
      ></a>
      <div id="description">
        <p class="mb-1">Press <i class="fa-solid fa-thumbtack text-light px-1"></i> or enter to add a task</p>
        <p class="mb-1">Press <i class="fa-solid fa-calendar-xmark text-light px-1"></i> to remove checked tasks</p>
        <p class="mb-0">Hold <i class="fa-solid fa-calendar-xmark text-light px-1"></i> to remove all tasks</p>
        <span class="arrow"><wbr /></span>
      </div>
    </div>
    <div class="card-body px-4">
      <ul id="list" class="list-unstyled mx-3">
        <div @fade *ngFor="let task of tasks; let i = index">
          <li class="d-flex mb-2">
            <div>
              <input
                id="{{ task.id }}"
                class="form-check-input me-2"
                type="checkbox"
                [(ngModel)]="task.completed"
                (change)="[!(task.completed = tasks[i].completed), saveTasks()]"
              />
            </div>
            <label class="form-check-label" for="{{ task.id }}">{{ task.title }}</label>
          </li>
        </div>
      </ul>
      <form class="mt-3" [formGroup]="toDoForm" (ngSubmit)="onSubmit()">
        <div class="input-group mx-auto">
          <input id="taskInput" class="form-control" type="text" formControlName="taskTitle" placeholder="New task" />
          <button type="submit" class="btn btn-sm btn-dark" aria-label="Add task">
            <i class="fa-solid fa-thumbtack text-light px-1"></i>
          </button>
          <button
            id="clearTasks"
            type="button"
            class="btn btn-sm btn-dark"
            longPress
            (mouseLongPress)="clearTasks(true)"
            (click)="clearTasks(false)"
            aria-label="Remove task"
          >
            <i class="fa-solid fa-calendar-xmark text-light px-1"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
