<div class="col text-center mx-auto">
  <span id="disclaimer" class="badge rounded-pill fw-bold mb-4">Only 1st and 2nd Gen</span>
  <div id="pokeCard" class="card mx-auto">
    <div class="card-header d-flex justify-content-center">
      <h6 class="m-0">Gotta Catch 'Em All!</h6>
      <a id="aboutPoke" href="https://pokeapi.co/" target="_blank"><i class="fa-solid fa-circle-question"></i></a>
      <div id="description" class="text-center">
        <a class="text-light" href="https://pokeapi.co/" target="_blank">
          <i class="fa-solid fa-gamepad"></i> The RESTful Pokémon API
        </a>
        <p class="mt-1 mb-0">Card to request a random Pokémon</p>
        <p class="mb-0">using the Fetch API</p>
        <span class="arrow"><wbr /></span>
      </div>
    </div>
    <div class="card-body p-3">
      <img class="mb-4" width="100px" alt="" src="{{ this.pkUrl }}" />
      <div>
        <span class="badge rounded-pill fs-7">{{ this.pkNumber }}</span>
      </div>
      <div class="mt-2">
        <span class="badge rounded-pill">{{ this.pkName }}</span>
      </div>
    </div>
    <div class="card-footer p-0">
      <button id="cyclePoke" type="button" class="btn w-100" (click)="this.fetchPkmn(this.ranNum)">
        <i class="fa fa-arrows-rotate"></i>
      </button>
    </div>
  </div>
</div>
